  - "Utilizador pode escolher período (coerente com a vista de horas ou equivalente documentado) e um ou mais boards."
  - "Ficheiro gerado usa ; como delimitador de campo e abre/salvaguarda conteúdo conforme regras da spec (RFC4180 adaptado a ;)."
  - "Linhas exportadas refletem a mesma semântica de inclusão de segmentos no período que a agregação atual (endMs no intervalo do período), salvo decisão explícita em contrário na spec."
  - "Comportamento sem dados, erro de rede e boards arquivados tratados de forma definida na spec."
scope:
  in:
    - "UI/fluxo de exportação e geração do CSV no cliente (sem backend próprio)."
