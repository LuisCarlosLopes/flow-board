title: "Endurecimento de segurança da SPA (revisão pós-auditoria)"
slug: "security-hardening-mvp"
created_at: "2026-04-21"
context: "FlowBoard — apps/flowboard; PAT em sessionStorage; cliente GitHub no browser"

objective: >
  Fechar lacunas identificadas na revisão de segurança: validação de sessão/apiBase,
  hostname do repositório, CSP/cabeçalhos onde aplicável, validação de JSON remoto,
  higiene de erros e documentação/ADR alinhada à Constitution III.

acceptance_criteria:
  - "Sessão carregada de sessionStorage só é aceita se apiBase estiver na allowlist; valor inválido limpa sessão ou normaliza para API oficial conforme decisão do IPD."
  - "parseRepoUrl rejeita hostnames fora da allowlist explícita (ex.: evilgithub.com); testes Vitest cobrem casos de regressão."
  - "index.html (ou camada de deploy) define CSP e, se viável no Vite dev+build, não quebra HMR nem fonts; documentar limites se CSP só em produção."
  - "parseCatalog e parseBoard validam estrutura mínima dos campos usados pela app (além de schemaVersion); testes em boardRepository.test.ts ou equivalente."
  - "console.error em fluxos sensíveis não imprime objetos de erro brutos com stack em produção, ou mensagens são redigidas (escopo mínimo)."
  - "ADR-004 ou novo ADR registra allowlist de apiBase, validação de sessão e relação com CSP (Constitution III)."
  - "npm test e npm run build em apps/flowboard passam; cobertura nas áreas tocadas ≥ meta do AGENTS.md."

scope:
  in:
    - "apps/flowboard/src/infrastructure/session/sessionStore.ts e testes"
    - "apps/flowboard/src/infrastructure/github/url.ts, client.ts, fromSession.ts e testes"
