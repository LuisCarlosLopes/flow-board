title: "Feature flags de preview e painel na home"
slug: "preview-feature-flags"
created_at: "2026-04-26T00:00:00.000Z"
context: "FlowBoard SPA — experiência pós-login (AppShell) e novos desenvolvimentos."
objective: >
  Introduzir um sistema de feature flags para funcionalidades em desenvolvimento (preview),
  com registo em código, persistência de preferências do utilizador por browser, e um controlo
  discreto na área principal (home/board shell) para listar apenas previews ativos, permitindo
  ativar ou desativar cada um. Funcionalidades consideradas definitivas não aparecem nesta lista.
acceptance_criteria:
  - "Existe um registo canónico de flags de preview (identificador estável, metadados para UI, default)."
  - "O utilizador pode ligar/desligar cada preview; o estado persiste entre sessões no mesmo browser (escopo local, sem GitHub)."
  - "A home/shell mostra um controlo discreto (ex.: botão ou link pouco intrusivo) que abre o painel de previews."
  - "O painel lista só funcionalidades em modo preview; flags 'definitivas' / GA não são listadas."
  - "Código que depende de uma preview consulta a flag de forma centralizada (evitar espalhar strings mágicas)."
  - "Comportamento verificável com testes (domínio ou hooks/store) nos ficheiros tocados."
scope:
  in:
    - "apps/flowboard/src — registry de flags, store de preferências, UI do painel, integração no AppShell ou vista inicial."
    - "Testes Vitest para regras de filtro (preview vs GA) e persistência."
  out:
    - "Flags remotas ou A/B sem spec futura."
    - "Sincronização de preferências entre dispositivos ou via repositório GitHub."
    - "Alteração de release notes / versão (salvo necessidade mínima documentada)."
tech_context: "TypeScript, React 19, Vite; sem backend próprio; preferências apenas client-side alinhadas à Constitution (II)."
baseline_ref: "044b119d13ccc1e4cfe43eb3e992a6a42ea0273b"

