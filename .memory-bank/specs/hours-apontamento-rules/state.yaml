title: "Regras de soma de horas e apontamentos por dia"
slug: "hours-apontamento-rules"
created_at: "2026-04-20"
context: "FlowBoard — domínio de tempo (timeEngine, timeSegments, agregação de horas)"

objective: >
  Ajustar regras para que (1) apenas tempo em coluna com papel Em Progresso (in_progress)
  contribua para horas registradas; colunas com outro papel não acumulam tempo.
  (2) Ao atravessar a meia-noite no fuso local, o trabalho contínuo deve virar múltiplos
  apontamentos (segmentos), um por dia civil.
  (3) Permitir configurar no board uma janela de trabalho (expediente local) e somar horas
  somente dentro dessa faixa, evitando inflar tempo quando o card permanece em progresso fora do horário útil.

acceptance_criteria:
  - "Card em coluna com role diferente de in_progress não acumula duração: não há segmento concluído nem relógio ativo que conte fora desse papel (estado inconsistente é saneado sem somar tempo inválido)."
  - "Sessão de trabalho que cruza meia-noite local gera N segmentos concluídos (N = número de dias civis cobertos), cada um com startMs/endMs dentro do mesmo dia local."
  - "Com workingHours configurado no board, tempo fora da faixa no dia local não entra em segmentos persistidos; com workingHours ausente, comportamento permanece equivalente ao legado (24h)."
  - "Documento persistido (BoardDocumentJson + timeSegments + cardTimeState) permanece consistente com appendNewSegments / repositório GitHub."
  - "Testes de domínio cobrem: split por dia; reconciliação de janela (ex.: esquecimento fora do expediente); card fora de in_progress sem activeStartMs fantasma; regressão sem janela."
  - "lint + test do pacote apps/flowboard passam."

scope:
  in:
    - "apps/flowboard/src/infrastructure/persistence/types.ts e boardFactory (campo opcional workingHours)"
    - "apps/flowboard/src/domain/timeEngine.ts, hoursProjection.ts e/ou workingHours.ts e testes"
    - "apps/flowboard/src/features/board/BoardView.tsx (reconciliação dia + bordas de janela)"
    - "UI de configuração da janela no board (modal ou extensão do editor existente)"
    - "apps/flowboard/src/features/board/timeBridge.ts se a escrita de segmentos exigir ajuste"
  out:
    - "Mudança de PRD/TSD completos (apenas plano + implementação futura)"
    - "Backend próprio; alteração de contrato GitHub além do JSON já usado"
    - "Fuso por usuário ou por board (MVP: mesma interpretação local do browser)"
    - "Janela que cruza meia-noite (turno noturno) no primeiro release desta feature"

tech_context: "TypeScript, React, Vite, Vitest; regras no domínio (Constitution I); segmentos em timeSegments + cardTimeState."

