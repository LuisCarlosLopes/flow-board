decisions:
  - decision: "Definição de 'virar o dia'"
    choice: "Dia civil local do cliente, alinhado a localDayRange em hoursProjection."
    reason: "Consistência com relatório de horas por dia/semana/mês já baseado em calendário local."
  - decision: "Onde armazenar a janela de trabalho"
    choice: "Campo opcional workingHours no BoardDocumentJson; ausente = 24h contábil (legado)."
    reason: "Persistência já é por board no GitHub; evita backend e mantém um único documento."
  - decision: "Ordem das transformações no tempo contábil"
    choice: "Recortar por dia civil, depois intersecionar com a janela do dia; descartar intervalos vazios."
    reason: "Invariantes claras: um segmento gravado ⊆ um dia local ⊆ expediente quando configurado."
  - decision: "plan-reviewer 2ª rodada"
    choice: "🟡 APROVADO COM RESSALVAS — score 80/100; ver A1 (D4×D5 activeStartMs) e A2 (D6 opção A vs B) em plan-reviewer-TASK.md"
    reason: "IPD atualizado com D5/D6; bloqueadores de implementação são ressalvas, não críticos."
  - decision: "D6 — comportamento após fim da janela"
    choice: "Opção A: próximo activeStartMs = início da próxima janela válida; não exige novo movimento de card."
    reason: "Fechamento da ressalva A2 do plan-reviewer; alinhado ao IPD e ao task.md."
  - decision: "D4×D5 — activeStartMs após meia-noite com expediente"
    choice: "Usar início da janela do dia civil corrente quando workingHours ativo (ver task.md travamento A1)."
    reason: "Implementação da ação A1 do plan-reviewer."

