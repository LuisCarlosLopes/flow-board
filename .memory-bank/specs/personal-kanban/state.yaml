title: "FlowBoard — Kanban pessoal com rastreamento de tempo (MVP)"
slug: personal-kanban
created_at: "2026-04-19"
context: "Greenfield web desktop-first; persistência GitHub API + PAT + JSON em repo privado"

objective: >
  Entregar o MVP do produto FlowBoard conforme PRD personal-kanban-dev-v1.0:
  login (URL do repositório + PAT), múltiplos quadros Kanban com colunas editáveis e papéis
  Backlog / Em progresso / Concluído, CRUD e movimentação de cards, rastreamento de tempo por
  segmentos alinhado às transições de coluna, totais por atividade e tela de monitoramento
  (dia/semana/mês) com escopo por quadro; single-user; dados no repositório do usuário via GitHub API.

acceptance_criteria:
  - "PRD de referência aprovado no gate de produto (EPIC); escopo MVP seção 7; nome FlowBoard na UI e docs da squad"
  - "TSD (spec-epic) com contratos, regras formais (D1–D2, D6–D14), decisões e riscos; spec-reviewer 🟢/🟡"
  - "ARD (architect-epic) com ADRs e diagramas; IPD (planner-epic) com plan-reviewer 🟢/🟡"
  - "task.md decompõe sub-tarefas com tracks filhos; cada entrega: implementer → code-reviewer → tester sem critical"

scope:
  in:
    - "Especificação técnica, arquitetura, plano, código do app FlowBoard e testes por sub-entrega do épico"
    - "Integração GitHub API para leitura/escrita de JSON conforme decisões da spec"
  out:
    - "Fase 2 do PRD (offline-first avançado, colaboração multi-usuário, integrações Issues/PRs)"
    - "Mobile nativo e billing (explícitos como fora do escopo no PRD)"

tech_context: "A definir na TSD (PRD deixa stack frontend em aberto). Backend lógico = GitHub + JSON. Desktop-first."

