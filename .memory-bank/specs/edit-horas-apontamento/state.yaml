title: "Editar horas de apontamento (modal)"
slug: "edit-horas-apontamento"
created_at: "2026-04-22"
context: "FlowBoard — vista Horas no período (HoursView), domínio timeSegments, persistência GitHub"

objective: >
  Permitir ao usuário ajustar as horas registradas a partir da tela "Horas no período",
  abrindo uma modal para editar o valor, com persistência no documento do quadro e
  atualização do total e da tabela após salvar.

acceptance_criteria:
  - "Na vista Horas no período, cada linha da tabela (tarefa/quadro) oferece ação explícita para editar o tempo (ex.: botão ou célula acionável com rótulo/aria adequados)."
  - "Ao acionar, abre-se uma modal com contexto mínimo da tarefa (título, quadro) e campo para o novo total de horas no período exibido (ou regra explícita na spec se o escopo for outro)."
  - "Salvar aplica a alteração no armazenamento (GitHub) de forma consistente com timeSegments/cardTimeState e regras de domínio existentes; erros de rede/persistência são comunicados."
  - "O rodapé Total reflete a soma após edição; a lista recarrega ou atualiza sem estado incoerente."
  - "Comportamento verificável: testes automatizados (domínio e/ou E2E) alinhados ao TSD; lint limpo no pacote afetado."

scope:
  in:
    - "apps/flowboard/src/features/hours/ (HoursView, modal, estilos)"
    - "Domínio e persistência: ajuste de timeSegments ou contrato acordado no TSD"
    - "apps/flowboard/src/infrastructure/persistence/ conforme contrato de BoardDocumentJson"
  out:
    - "Backend próprio; mudança de autenticação GitHub"
    - "Sincronização multi-dispositivo em tempo real"
    - "Exportação/relatórios PDF além do que já existir"

tech_context: "TypeScript, React, Vite; Constitution I (regras no domínio); persistência só via GitHub API no MVP."

