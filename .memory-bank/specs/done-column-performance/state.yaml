title: "Performance da coluna Concluído (paginação / janela de renderização)"
slug: "done-column-performance"
created_at: "2026-04-20"
context: "apps/flowboard — coluna com role done no BoardView"

objective: >
  Manter a performance do app quando a coluna Concluído acumula muitos cards,
  adotando uma estratégia de paginação ou equivalente (janela de renderização)
  sem alterar o modelo de persistência GitHub nem as regras de domínio do quadro.

acceptance_criteria:
  - "Com N grande na coluna Concluído, o custo de renderização e interação permanece aceitável (sem degradação linear óbvia no DOM)."
  - "Arrastar cards para/de outras colunas e dentro de Concluído continua coerente com as regras atuais de layout (applyDragEnd / dnd-kit)."
  - "O documento JSON do quadro e o contrato de persistência (ADR-002) permanecem inalterados."
  - "Regras de domínio (boardLayout, timeEngine) não são duplicadas na UI; apenas fatias de apresentação."

scope:
  in:
    - "Estratégia de UI para limitar trabalho de render na coluna role=done."
    - "Integração com @dnd-kit existente (SortableContext / useSortable)."
    - "Testes de regressão em domínio existente onde aplicável."
  out:
    - "Backend ou paginação de API (não há servidor de dados próprio no MVP)."
    - "Mudar formato do JSON do board no GitHub."
    - "Virtualizar outras colunas além de Concluído (a menos que o IPD estenda)."

tech_context: >
  React 19 + Vite + TypeScript; @dnd-kit/core e @dnd-kit/sortable; cartões em BoardColumn
  mapeiam cardIds completos. Estado do quadro é BoardDocumentJson carregado por completo do cliente.

