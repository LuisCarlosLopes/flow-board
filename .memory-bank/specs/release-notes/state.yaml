title: "Release Notes Page with Versioning"
slug: "release-notes-feature"
created_at: "2026-04-20"
context: "FlowBoard MVP — Personal Kanban with Time Tracking"

objective: |
  Implement a versioning system and dedicated Release Notes page for FlowBoard.
  Display current app version visually in UI. Create a release notes page with
  organized changelog. Use JSON-based release data (simple, no external dependencies).

acceptance_criteria:
  - "Current app version displayed in App Shell (header or footer)"
  - "Release Notes page accessible at /releases route"
  - "releases.json contains at least 2 versions (0.1.0 and 0.2.0) with typed structure"
  - "Release cards show version, date, type icons (feature/fix/improvement), and descriptions"
  - "Page is responsive and matches FlowBoard design tokens"
  - "Version can be updated by editing single source of truth (releases.json)"
  - "E2E test verifies release notes page loads and displays content"
  - "Unit tests for ReleaseNotesPage and useCurrentVersion hook"

scope:
  in:
    - "Create src/data/releases.json with structured release data"
    - "Create src/features/release-notes/ with components and hooks"
    - "Add /releases route to App.tsx router"
    - "Display version badge in App Shell (topbar or footer)"
    - "Create useCurrentVersion hook to access app version"
    - "Add tests for release notes components"
  out:
    - "Dynamic backend API for releases (future scope)"
    - "GitHub Actions auto-versioning (future scope)"
    - "Markdown changelog parsing (use JSON for simplicity)"
    - "Multi-language support (English only for MVP)"

tech_context: |
  Stack: React 19, Vite, TypeScript (strict), Vitest, Playwright

  Design tokens available at: src/styles/tokens.css
  Routing: React Router (implicit from App.tsx structure)

  Folder structure: feature-based (src/features/*)

  Testing: Vitest for unit tests, Playwright for E2E

  Release data format (JSON):
  - releases: array of objects with version, date, status, changes array
  - changes: type (feature|fix|improvement|breaking), title, description
  - version follows semantic versioning (major.minor.patch)

