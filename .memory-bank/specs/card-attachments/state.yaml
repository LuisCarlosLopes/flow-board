title: "Anexos em Cards (upload, preview, download)"
slug: card-attachments
created_at: "2026-04-22"
context: "FlowBoard — cards persistidos em JSON no repositório GitHub do usuário (MVP)."
objective: >
  Permitir anexar arquivos aos cards (jpg, md, pdf, docx, xlsx), até 10 MB por arquivo,
  armazenados como blobs no mesmo repositório; preview in-app para .jpg e .md; download
  para todos os tipos aceitos.
acceptance_criteria:
  - "No modal de criação/edição de card, o usuário pode selecionar um ou mais arquivos cujas extensões estejam na lista permitida."
  - "Arquivos acima de 10 MB (por arquivo) são rejeitados antes do upload, com mensagem clara."
  - "Após salvar, o anexo existe no repositório em caminho estável sob `flowboard/` e o documento do board referencia o anexo (metadados no JSON do board)."
  - "Imagens .jpg/.jpeg exibem preview (thumbnail ou visualização) na UI do card/modal."
  - "Arquivos .md exibem preview renderizado (Markdown) na UI, sem executar scripts."
  - "O usuário pode baixar qualquer anexo aceito; o download funciona sem expor o PAT na URL."
  - "Remover anexo remove o arquivo no GitHub (ou documenta e implementa política de órfãos se indisponível) e atualiza o JSON do board."
  - "Testes de domínio cobrem validação de tipo/tamanho/nome; testes manuais ou E2E mínimos documentados para fluxo feliz."
scope:
  in:
    - "Extensões: .jpg, .jpeg, .md, .pdf, .docx, .xlsx"
    - "Limite 10 MB por arquivo"
    - "Armazenamento no repo do usuário via GitHub Contents API"
    - "Preview: jpg/jpeg, md"
    - "Download de todos os tipos aceitos"
    - "Integração com CreateTaskModal / fluxo de edição de card existente"
  out:
    - "Git LFS, versionamento de anexos, diff de binários"
    - "Preview de PDF/DOCX/XLSX in-app (apenas ícone + download)"
    - "Compartilhamento público de anexos fora da sessão autenticada"
    - "Backend próprio além do GitHub (violaria Constitution II sem ADR)"
tech_context: "TypeScript, React, Vite; GitHubContentsClient em apps/flowboard; BoardDocumentJson schemaVersion 1 hoje; Vitest."
baseline_ref: "main (workspace atual)"

