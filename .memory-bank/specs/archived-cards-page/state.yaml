title: "Página dedicada para cards arquivados (fora do board)"
slug: archived-cards-page
created_at: "2026-04-22"
context: >
  FlowBoard MVP — feature card-archive já entregue: cards arquivados somem do Kanban,
  mas hoje aparecem numa secção colapsável no próprio BoardView (fb-archived).
  Objetivo: mover essa visão para uma rota/página separada e remover a secção do quadro.

objective: >
  Oferecer uma página (rota) dedicada para listar e gerir cards arquivados do board ativo,
  com as mesmas capacidades essenciais já existentes (restaurar, eliminar conforme regras atuais),
  e remover do BoardView a UI inline de "Arquivados" para o board ficar só com colunas Kanban.

acceptance_criteria:
  - "BoardView não exibe mais a secção colapsável de arquivados; o quadro mostra apenas colunas e cards ativos."
  - "Existe navegação explícita do app para a página de arquivados (ex.: link/botão na barra ou contexto do board) quando aplicável ao board selecionado."
  - "A página de arquivados lista apenas cards com archived === true do documento do board ativo, ordenação alinhada ao domínio existente (ex. sortArchivedByDefault)."
  - "Restaurar e eliminar arquivados na nova página persistem o documento como hoje (mesmas invariantes de tempo/domínio)."
  - "Busca global (SearchModal) e badge de arquivado mantêm comportamento definido em card-archive; spec deve declarar se há deep-link da busca para a página."
  - "Comportamento coberto por testes (domínio já coberto; UI/E2E conforme risco na fase tester)."

scope:
  in:
    - "Nova rota/página e componente(s) de UI para lista de arquivados."
    - "AppShell (ou router): entrada de navegação; possível estado quando nenhum board está selecionado."
    - "Remoção da secção fb-archived e estado archivedExpanded de BoardView (ou equivalente)."
    - "Reutilização de handlers de persistência já existentes ou extração mínima para compartilhar entre board e página."
  out:
    - "Mudança no modelo JSON ou novos campos de card."
    - "Arquivamento em massa, filtros avançados ou multi-board na mesma página."
    - "Backend além do fluxo GitHub atual."

tech_context: |
  Stack: React, Vite, TypeScript, React Router, Vitest, Playwright.
  Arquivos relevantes: AppShell.tsx, BoardView.tsx (secção fb-archived ~605+), domain/cardArchive.ts,
  CreateTaskModal (edição de card arquivado), SearchModal.
  Pré-requisito: entrega card-archive em .memory-bank/specs/card-archive/ (spec-feature.md, código em apps/flowboard).

