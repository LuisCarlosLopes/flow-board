designer_brief: |
  Nicho: dev tool / quadro técnico → alinhar a tech-dark já usada no app.
  Prioridades: densidade informativa (metadados sem novo schema), hierarquia tipográfica,
  grid/espaçamento consistente, acessibilidade (contraste, foco), CTA restaurar mais visível que excluir.
  Protótipo: prototype-archived-page.html — replicar toolbar (eyebrow, título+count, subtítulo, link voltar),
  painel com header "Histórico", linhas com meta e CTAs, estados vazio e loading com barra de shimmer;
  tokens e fontes: usar o que o app já expõe; demo inclui Sora/Plus Jakarta só como referência visual.
