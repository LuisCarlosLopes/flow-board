title: "Melhoria visual e de UX da página Arquivados"
slug: archived-page-ui-improvement
created_at: "2026-04-22"
context: >
  FlowBoard — página ArchivedCardsPage já entregue em archived-cards-page (rota dedicada).
  Feedback visual: baixa densidade de informação, título fraco, muito espaço vazio,
  hierarquia Restaurar vs Excluir, falta de metadados úteis na lista (sem mudar modelo de dados).

objective: >
  Elevar a tela de arquivados com layout mais confiante, hierarquia tipográfica clara,
  metadados derivados do documento existente (coluna de origem, data de arquivamento quando houver),
  estados vazio/carregando mais polidos e navegação contextual para o quadro — alinhado ao design
  system atual (tokens CSS), à skill designer (preset tech-dark / dev tool) e à referência visual
  canónica em prototype-archived-page.html (área de conteúdo da página, sem duplicar shell do AppShell).

acceptance_criteria:
  - "Lista de arquivados exibe pelo menos título + coluna de origem (label da coluna) e data de arquivamento quando archivedAt estiver definido; formatação legível em pt-BR; estrutura e densidade alinhadas ao protótipo HTML (Sec. 2.5 do planner-TASK.md)."
  - "Cabeçalho da página ou da secção principal tem hierarquia visual clara (eyebrow opcional, título proeminente + contagem + subtítulo explicativo); painel com cabeçalho tipo histórico; layout usa melhor a área útil sem violar padrões do AppShell."
  - "Botão Restaurar tem peso visual primário ou secundário estável; Excluir permanece destrutivo mas não domina a linha."
  - "Existe atalho explícito de navegação para voltar ao quadro (texto/link ou botão) coerente com React Router já usado no app."
  - "Sem novos campos no JSON do board nem mudanças de contrato de persistência; apenas leitura de columnId, columns[], archivedAt."
  - "Testes E2E existentes de arquivados ajustados ou estendidos se seletores ou cópia mudarem; Vitest/build verdes."

scope:
  in:
    - "ArchivedCardsPage.tsx e ArchivedCardsPage.css (e imports mínimos)."
    - "AppShell ou rota apenas se necessário para o link Voltar ao quadro (preferir Link/useNavigate dentro da própria página)."
    - "Opcional: filtro de busca local por título (client-side) se couber no TASK sem inflar escopo."
  out:
    - "Arquivamento ou exclusão em massa."
    - "Novos campos em Card ou BoardDocumentJson."
    - "Etiquetas/tags (não existem no modelo Card hoje)."

tech_context: |
  React, Vite, TypeScript, CSS com variáveis (--space-*, --text-*, BoardView patterns).
  Referência de implementação: apps/flowboard/src/features/board/ArchivedCardsPage.tsx.
  Referência de UI (protótipo estático, abrir no browser): .memory-bank/specs/archived-page-ui-improvement/prototype-archived-page.html
  (mapear para tokens do app; não importar blocos proto-shell/proto-demo nem fontes Google sem decisão de produto).
  Screenshot legado: .cursor/projects/.../assets/image-74a1150a-1022-4708-baa3-7b55edf10664.png (workspace).

