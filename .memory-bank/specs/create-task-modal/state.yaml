title: "Melhorar criação de tarefas — Modal com campos estruturados"
slug: create-task-modal
created_at: "2026-04-19"
context: "FlowBoard — Feature incremental"

objective: >
  Entregar um modal de criação de tarefas no FlowBoard com:
  - Campo descrição compatível com Markdown
  - Campo data planejada (date picker)
  - Campo data de criação (auto-preenchido, read-only)
  - Campo horas previstas (número)
  - Botão para copiar descrição (com feedback visual)
  - Integração com o modelo Task existente
  - Testes E2E do fluxo

acceptance_criteria:
  - "Modal exibe todos os 5 campos com labels e validação"
  - "Descrição com Markdown renderiza corretamente na visualização"
  - "Data planejada selecionável via date picker nativo ou Shadcn"
  - "Data criação read-only, preenchida automaticamente com now()"
  - "Horas previstas aceita números ≥0; rejeita inválidos com feedback"
  - "Botão copy copia descrição para clipboard com feedback (toast/spinner)"
  - "Task criada persiste em GitHub conforme spec-epic D3 e D4"
  - "Sem ESLint crítico; cobertura ≥80% em componente modal"

scope:
  in:
    - "Componente modal reutilizável CreateTaskModal"
    - "Integração com useCreateTask (Domain/hooks)"
    - "Testes unitários do componente"
    - "Testes E2E (Playwright) do fluxo criar tarefa"
    - "Atualização do Kanban para trigger do modal"
  out:
    - "Edição de tarefas existentes (fora do escopo)"
    - "Bulk operations"
    - "Markdown preview em tempo real (MVP simples apenas)"

tech_context: >
  Stack FlowBoard: React 19 + TypeScript + TailwindCSS + Shadcn/ui + Playwright.
  Domain: Task model em src/domain/ com fields (id, title, description, plannedDate, plannedHours, createdAt).
  API: GitHub Contents API via src/infrastructure/github-client.ts.
  Hooks: useCreateTask, useBoard existentes em src/hooks/; criar useClipboard auxiliar se necessário.

