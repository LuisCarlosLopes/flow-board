title: "Proteção do PAT GitHub (sessão server-side e BFF)"
slug: "github-pat-bff-security"
created_at: "2026-04-25"
context: "FlowBoard — apps/flowboard; Constitution III; ADR-004 (sessionStorage atual) vs evolução de segurança"

objective: >
  Elevar a segurança do armazenamento e uso do Personal Access Token do GitHub, alinhando-se
  ao guia de referência (defesa em profundidade, sem PAT em Web Storage, transporte e repouso
  seguros, proxy/BFF) sem reinventar o guia: o TSD traduz requisitos para o produto e contratos
  observáveis; decisões de stack (Vite+servidor dedicado, evolução mínima, etc.) fecham em
  planner/ADR pós-revisão.

acceptance_criteria:
  - "TSD descreve requisitos, regras, contratos e fronteiras; não contém plano de arquivos ou escolha de lib como seção de implementação (fronteira com planner)."
  - "Cobre explícito: o PAT não fica acessível a JavaScript de página (HttpOnly) após a transição; chamadas à API GitHub com credencial ocorrem só no contexto aprovado (servidor/BFF) ou equivalente com mesma barreira de segurança documentada."
  - "Cita e reconcilia o guia docs/Protegendo PAT GitHub em Next.js.md como referência de princípios; registra mapeamento conceitual para a stack real do repositório (Vite/React, ausência hoje de Next App Router) como decisão aberta ou restrição de produto conforme o que o especificador encontrar no código."
  - "Rastreia conflito/atualização necessária em relação a ADR-004 e Constitution III (mudança de sessão exige ADR)."

scope:
  in:
    - "Autenticação e sessão do FlowBoard (PAT, metadados de repositório, logout)"
    - "Acesso a api.github.com e fluxos de dados do quadro (somente o que for impactado por mover credencial)"
    - "Especificação e posteriores ADR/plano para endurecimento; documentação mínima exigida pela governança"
  out:
    - "Definição de preço/self-hosted enterprise"
    - "Mudanças de produto fora de segurança de credencial (ex.: funcionalidades de board novas) salvo se bloqueio técnico"

tech_context: "React, Vite, TypeScript, Vitest; deploy alvo Vercel — BFF = Serverless Functions Node + static SPA; iron-session; dev local com proxy. Guia Next.js mapeado por princípios."
