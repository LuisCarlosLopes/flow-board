title: "Maximizar tela de detalhes do card (modal de tarefa)"
slug: card-details-maximize
objective: >
  Oferecer controle explícito para expandir o modal de criação/edição de tarefa
  (detalhes do card) para ocupar quase toda a viewport, melhorando leitura e edição
  de descrições longas, com opção de voltar ao tamanho padrão sem fechar o modal.

acceptance_criteria:
  - "Com o modal aberto, existe controle visível (ex.: ícone) para alternar entre tamanho padrão e maximizado."
  - "No estado maximizado, o painel do formulário usa área substancialmente maior (ex.: largura/altura próximas ao viewport com padding seguro), mantendo overlay e fechamento por Cancelar/ESC."
  - "O estado maximizado/restaurado pode ser alternado sem perder dados digitados no formulário."
  - "Controles com `data-testid` estáveis para o toggle (e estados) para testes."
  - "Sem regressão em validação, submit e acessibilidade básica do diálogo (`role=\"dialog\"`, título associado)."

scope:
  in:
    - "apps/flowboard/src/features/board/CreateTaskModal.tsx"
    - "apps/flowboard/src/features/board/CreateTaskModal.css"
    - "apps/flowboard/src/features/board/CreateTaskModal.test.tsx (e testes adicionais se necessário)"
  out:
    - "Persistência da preferência maximizado em localStorage (pode virar follow-up)."
    - "Fullscreen da API do browser (Fullscreen API) — não obrigatório; preferir layout CSS no overlay."
    - "Mudanças em domínio, repositório GitHub ou schema de Card."

tech_context: >
  React 19 + Vite no app flowboard; modal existente `.fb-ctm` com largura máxima 560px
  e altura limitada; padrão de testes Vitest no repositório.

