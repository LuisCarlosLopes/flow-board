title: "Autenticação BFF: PAT validado no servidor, sessão cifrada em cookie httpOnly"
slug: "github-pat-bff-cookie-auth"
created_at: "2026-04-23"
context: "FlowBoard — apps/flowboard; hoje PAT em sessionStorage e chamadas GitHub do browser (ADR-004). Nova direção: servidor valida PAT e repassa credencial apenas server-side."

objective: >
  Implementar fluxo em que o usuário envia o PAT uma vez via POST, o backend valida com GET /user na API GitHub, persiste sessão criptografada em cookie httpOnly, protege rotas internas que proxyam ou encapsulam GitHub, e nunca expõe o PAT ao cliente após o login. Logout limpa o cookie. Re-login com PAT novo exige logout prévio. Expor ao cliente somente login, name, avatar_url.

acceptance_criteria:
  - "RF01: POST de login com PAT; backend chama https://api.github.com/user; 401/4xx/5xx de auth → login rejeitado; 200 confirma PAT."
  - "RF02: Sessão server-side cifrada (ex.: payload assinado/cifrado) com PAT + dados básicos do utilizador; cookie httpOnly, Secure em produção, SameSite apropriado, path escopo mínimo."
  - "RF03: Rotas BFF internas exigem sessão válida; cookie ausente/corrompido/expirado → 401."
  - "RF04: Chamadas à API GitHub a partir de rotas protegidas usam Authorization: token <PAT> só no servidor; cliente não reenvia PAT após estabelecida a sessão."
  - "RF05: Logout remove/invalidate cookie imediatamente."
  - "RF06: Rota pública (após autenticação) devolve só login, name, avatar_url — nunca o PAT."
  - "Regra de estado: autenticado com PAT novo sem logout explícito → 409 ou fluxo documentado que recusa (não substitui sessão silenciosamente)."

scope:
  in:
    - "Camada de servidor (BFF) integrada ao app — ver TSD: Vite middleware, serviço Node dedicado, ou outro padrão escolhido no spec"
    - "Autenticação, cookie, segredo de cifragem (env), rotas de login/logout/me"
    - "Refatoração do cliente: remover PAT de sessionStore para operações GitHub; chamar BFF"
    - "Atualização de ADR-004 (deprecar/substituir) e alinhamento Constitution III"
    - "Testes (Vitest + ajuste E2E se necessário)"
  out:
    - "OAuth GitHub App (fase 2)"
    - "Rotação automática de PAT"
    - "Multi-tenant / multi-GitHub Enterprise além do que o spec fixar"

tech_context: "React 19, Vite 8, TypeScript, Vitest, Playwright E2E; GitHub REST api.github.com; hoje ADR-004 = PAT no browser"
