title: "Fronteira segura para token GitHub"
slug: "secure-github-token-boundary"
created_at: "2026-04-24"
context: "FlowBoard — apps/flowboard; autenticação GitHub hoje usa PAT direto no browser e sessão em localStorage com migração legada de sessionStorage"

objective: >
  Reduzir a exposição do PAT no cliente removendo o token do modelo de sessão persistido
  no browser e introduzindo uma fronteira segura para chamadas autenticadas à API GitHub,
  preservando a persistência dos dados FlowBoard no repositório GitHub configurado pelo usuário.

acceptance_criteria:
  - "Após login bem-sucedido, a sessão persistida no browser não contém PAT, token GitHub bruto nem segredo equivalente."
  - "Chamadas autenticadas para leitura/escrita GitHub deixam de enviar o PAT diretamente a partir de JavaScript da SPA."
  - "Logout invalida a sessão local e qualquer credencial transitiva/servidor associada à sessão do usuário."
  - "Migração de sessões legadas com PAT em localStorage/sessionStorage remove o PAT do storage e força reconexão ou reemissão segura conforme decisão aprovada."
  - "Erros de autenticação, autorização, expiração e conflito GitHub continuam apresentados de forma clara e sem vazamento de segredo."
  - "E2E e testes unitários cobrem que storage do browser não contém PAT após login, reload e logout."
  - "ADR-001 e ADR-004 são substituídas, deprecadas ou atualizadas antes de merge para registrar a nova fronteira de segurança."

scope:
  in:
    - "Novo contrato de autenticação/sessão para FlowBoard sem PAT persistido no cliente."
    - "Fronteira segura para requisições GitHub autenticadas, mantendo dados de domínio em flowboard/** no repositório GitHub."
    - "Migração/limpeza de sessões legadas que contenham PAT em localStorage ou sessionStorage."
    - "Ajustes na UI de login/logout e mensagens de erro necessárias para o novo fluxo."
    - "Atualização de testes unitários, testes E2E e ADRs afetadas."
  out:
    - "Persistência de dados de domínio fora do repositório GitHub configurado pelo usuário."
    - "OAuth GitHub completo como obrigação da primeira entrega, salvo decisão explícita no gate arquitetural."
    - "Suporte a GitHub Enterprise ou apiBase customizado."
    - "Rotação automática de PAT no GitHub ou revogação do PAT original na conta do usuário."
    - "Mudança funcional em quadro, cards, apontamento de horas, releases ou anexos fora do necessário para adaptar a persistência."

tech_context: "React 19, Vite 8, TypeScript, Vitest, Playwright; Constitution II ainda exige dados de domínio no GitHub, mas Constitution III exige ADR atualizado para qualquer mudança de PAT/sessão."
