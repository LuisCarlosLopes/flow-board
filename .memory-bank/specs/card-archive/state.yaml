title: "Arquivar card — área de arquivados e busca"
slug: card-archive
created_at: "2026-04-22"
context: "FlowBoard MVP — quadro Kanban com persistência GitHub; busca de cards já implementada (board-search)."

objective: >
  Permitir arquivar um card: removê-lo da visualização do board (colunas Kanban) e agrupá-lo
  em uma área de arquivados, mantendo o card indexável na busca global/modal de busca.

acceptance_criteria:
  - "Usuário pode arquivar um card a partir da UI do quadro (ação explícita, acessível)."
  - "Cards arquivados não aparecem nas colunas do Kanban nem contam para ordenação/drag da coluna."
  - "Existe uma área ou visão de 'Arquivados' onde o usuário vê cards arquivados do board ativo e pode restaurar ou excluir conforme regras definidas na spec."
  - "A busca existente (modal /) continua encontrando cards arquivados por título, descrição e demais campos já cobertos pela busca."
  - "Persistência no documento JSON do board compatível com ADR de schema; migração ou default seguro para boards legados."
  - "Comportamento verificável por testes de domínio (e E2E quando aplicável ao risco)."

scope:
  in:
    - "Modelo de domínio / JSON do board para estado archived do card."
    - "UI: arquivar, área de arquivados, integração com fluxo atual do BoardView."
    - "Integração com cardSearch e SearchModal para incluir arquivados nos resultados."
    - "Invariantes de tempo/rastreio se aplicáveis a cards arquivados."
  out:
    - "Arquivamento em massa ou filtros avançados na área de arquivados (salvo mínimo definido na spec)."
    - "Sincronização multi-dispositivo além do commit Git existente."
    - "Notificações ou automações externas."

tech_context: |
  Stack: React, Vite, TypeScript, Vitest, Playwright.
  Card em apps/flowboard/src/domain/types.ts; BoardDocumentJson em infrastructure/persistence/types.ts.
  Busca: apps/flowboard/src/domain/cardSearch.ts, SearchModal.tsx.
  Constitution: regras de negócio testáveis no domínio; persistência via GitHub API.

